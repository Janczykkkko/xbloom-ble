# Example recipe: a generic iced / flash-brew pour-over.
# Brews a smaller, more concentrated volume of hot water straight onto ice in
# the cup (add ~80 g of ice yourself). No `ratio` given, so the total is free.
name: Example Iced
dose_g: 18
grind: 58
stage_temps: [110.0, 92.0]
pours:
  # Bloom.
  - {ml: 50,  temp_c: 94, pattern: spiral, agitation: true, pause_s: 35, rpm: 110, flow_ml_s: 3.0}
  # Single concentrated main pour onto ice.
  - {ml: 130, temp_c: 92, pattern: spiral, pause_s: 5, rpm: 100, flow_ml_s: 3.0}
